<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📈 基金实时估值监控</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(160deg,#0d1117 0%,#161b22 60%,#0d1b2a 100%);
  min-height:100vh;color:#c9d1d9;padding:16px 12px 32px}

/* ── 顶部 ── */
.hd{text-align:center;margin-bottom:24px}
.hd h1{font-size:1.5rem;color:#58a6ff;letter-spacing:3px}
.hd .ts{font-size:.8rem;color:#8b949e;margin-top:5px}
.ctrl{display:flex;gap:10px;justify-content:center;margin-top:10px;align-items:center;flex-wrap:wrap}
.btn{padding:6px 16px;border-radius:8px;border:none;cursor:pointer;font-size:.82rem;
  font-family:inherit;transition:opacity .2s}
.btn-primary{background:#238636;color:#fff}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-edit{background:#b37b00;color:#fff}
.btn-edit:hover{opacity:.85}
.btn-save{background:#0969da;color:#fff}
.btn-save:hover{opacity:.85}
.btn-hint{font-size:.72rem;color:#484f58}
.btn-hint em{font-style:normal;color:#ffc53d}
.btn-danger{background:#b31d1d;color:#fff}
.btn-danger:hover{opacity:.85}
.btn-add{background:#1a6c3f;color:#fff}
.btn-add:hover{opacity:.85}
.btn-add:disabled{opacity:.5;cursor:not-allowed}

/* ── 基金管理面板 ── */
#mgmtPanel{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px;
  padding:14px 18px;
  margin-bottom:16px;
  display:none;
}
#mgmtPanel.open{display:block}
.mgmt-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.mgmt-label{font-size:.75rem;color:#8b949e;width:60px;flex-shrink:0}
.mgmt-input{
  flex:1;min-width:120px;max-width:200px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  border-radius:8px;color:#c9d1d9;
  font-size:.82rem;padding:5px 10px;
  font-family:monospace;outline:none;
}
.mgmt-input:focus{border-color:#58a6ff;background:rgba(88,166,255,.1)}
.mgmt-input.invalid{border-color:#ff4d4f;background:rgba(255,77,77,.1)}
.mgmt-hint{font-size:.72rem;color:#484f58;margin-top:-4px}
.mgmt-hint em{color:#ffc53d;font-style:normal}
.fund-tag{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(88,166,255,.12);border:1px solid rgba(88,166,255,.25);
  border-radius:20px;padding:3px 10px 3px 12px;
  font-size:.78rem;color:#c9d1d9;margin:3px;
}
.fund-tag-name{color:#8b949e;font-size:.7rem;margin-left:2px}
.fund-tag-del{
  cursor:pointer;color:#ff4d4f;font-size:.9rem;
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,77,77,.1);
  transition:background .15s;
  border:none;font-family:inherit;padding:0;
}
.fund-tag-del:hover{background:rgba(255,77,77,.3)}
.mgmt-divider{border:none;border-top:1px solid rgba(255,255,255,.08);margin:10px 0}
.live-dot{width:8px;height:8px;border-radius:50%;background:#3fb950;
  display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── 卡片 ── */
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:14px;padding:18px 20px;margin-bottom:16px;backdrop-filter:blur(6px)}
.card-title{font-size:.75rem;color:#8b949e;letter-spacing:1px;margin-bottom:14px;
  text-transform:uppercase}

/* ── 汇总卡 ── */
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.sum-item{text-align:center;padding:10px 4px;
  background:rgba(255,255,255,.04);border-radius:10px}
.sum-item .sv{font-size:1.35rem;font-weight:700}
.sum-item .sl{font-size:.7rem;color:#8b949e;margin-top:4px}

/* ── 表格 ── */
table{width:100%;border-collapse:collapse;font-size:.84rem}
th{color:#8b949e;font-size:.72rem;padding:7px 8px;text-align:right;
  border-bottom:1px solid rgba(255,255,255,.1);white-space:nowrap}
th:first-child{text-align:left}
td{padding:9px 8px;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle}
td.r{text-align:right}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.03)}
.fc{font-weight:700;color:#58a6ff;font-size:.9rem}
.fname{color:#8b949e;font-size:.72rem}
.num{font-family:monospace}
.bold{font-weight:700}
.group-header td{background:rgba(88,166,255,.08);color:#58a6ff;
  font-size:.75rem;font-weight:700;letter-spacing:1px;padding:6px 8px}

/* ── 成本编辑态 ── */
td.edit-mode{padding:5px 6px}
td.edit-mode .cost-static{display:none}
td.edit-mode .cost-input{display:inline-block}

.cost-input{
  display:none;
  width:90px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(88,166,255,.5);
  border-radius:6px;
  color:#fff;
  font-family:monospace;
  font-size:.82rem;
  padding:4px 6px;
  text-align:right;
  outline:none;
}
.cost-input:focus{
  border-color:#58a6ff;
  background:rgba(88,166,255,.1);
  box-shadow:0 0 0 2px rgba(88,166,255,.2);
}
.cost-input.invalid{
  border-color:#ff4d4f;
  background:rgba(255,77,77,.1);
}

/* ── 条形图 ── */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bl{width:56px;font-size:.75rem;color:#8b949e;flex-shrink:0}
.bt{flex:1;height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.bf{height:100%;border-radius:4px;transition:width .5s}
.bv{width:76px;text-align:right;font-size:.78rem;font-weight:700;flex-shrink:0}

/* ── 饼图区 ── */
.pie-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:.78rem}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-lbl{color:#c9d1d9;width:54px}
.leg-pct{color:#8b949e;width:40px;text-align:right}

/* ── Toast 提示 ── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(35,134,54,.95);color:#fff;
  padding:10px 20px;border-radius:10px;font-size:.85rem;
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;
  white-space:nowrap;
}
#toast.show{opacity:1}
#toast.error{background:rgba(207,46,46,.95)}

/* ── 加载状态 ── */
.loading-overlay{position:fixed;inset:0;background:rgba(13,17,23,.85);
  display:flex;align-items:center;justify-content:center;z-index:100;
  font-size:.9rem;color:#58a6ff}
.loading-overlay.hidden{display:none}

/* ── 指数横幅 ── */
.index-bar{
  display:flex;gap:16px;justify-content:center;align-items:center;
  flex-wrap:wrap;margin-top:10px;
}
.index-chip{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:5px 13px;font-size:.8rem;
  transition:border-color .3s;
}
.index-chip.up  {border-color:rgba(255,77,79,.4)}
.index-chip.down{border-color:rgba(63,185,80,.4)}
.idx-name{color:#8b949e;font-size:.72rem;white-space:nowrap}
.idx-val {font-weight:700;font-family:monospace;color:#c9d1d9}
.idx-pct {font-weight:700;font-size:.78rem;white-space:nowrap}
.idx-pct.up  {color:#ff4d4f}
.idx-pct.down{color:#3fb950}
.idx-loading{color:#484f58;font-size:.75rem;font-style:italic}

/* ── 云同步状态 ── */
#syncStatus{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.72rem;padding:3px 10px;border-radius:20px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:#8b949e;
  transition:all .3s;
}
#syncStatus.syncing{color:#ffc53d;border-color:rgba(255,197,61,.3);background:rgba(255,197,61,.05)}
#syncStatus.ok     {color:#3fb950;border-color:rgba(63,185,80,.3);background:rgba(63,185,80,.05)}
#syncStatus.error  {color:#ff4d4f;border-color:rgba(255,77,77,.3);background:rgba(255,77,77,.05)}
#syncStatus.loading{color:#58a6ff;border-color:rgba(88,166,255,.3);background:rgba(88,166,255,.05)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
#syncStatus.syncing .sync-dot{animation:pulse 1s infinite}

/* ── 底部 ── */
.footer{text-align:center;font-size:.72rem;color:#484f58;margin-top:8px}

@media(max-width:640px){
  .sum-grid{grid-template-columns:repeat(2,1fr)}
  .sum-item .sv{font-size:1.1rem}
  table{font-size:.76rem}
  td,th{padding:6px 5px}
  .cost-input{width:72px}
  .index-chip{padding:4px 10px;font-size:.75rem}
}
</style>
</head>
<body>

<!-- 加载遮罩 -->
<div id="loading" class="loading-overlay hidden">
  正在刷新数据…
</div>

<!-- 错误提示 -->
<div id="errorMsg" style="display:none;text-align:center;padding:8px 16px;
  background:rgba(255,77,77,.15);border:1px solid rgba(255,77,77,.4);
  border-radius:8px;margin:0 12px 16px;font-size:.8rem;color:#ff7875">
</div>

<div class="hd">
  <h1>📈 基金实时估值监控</h1>
  <div class="ts" id="updateTime">加载中…</div>
  <!-- 指数横幅 -->
  <div class="index-bar" id="indexBar">
    <span class="idx-loading">指数加载中…</span>
  </div>
  <div class="ctrl">
    <span id="liveIndicator" class="live-dot" title="自动刷新中"></span>
    <button class="btn btn-primary" id="refreshBtn" onclick="fetchAll()">🔄 刷新数据</button>
    <button class="btn btn-edit" id="editBtn" onclick="toggleEditMode()">✏️ 编辑成本</button>
    <button class="btn btn-save" id="saveBtn" onclick="saveCostEdits()" style="display:none">💾 保存修改</button>
    <button class="btn" id="mgmtBtn" onclick="toggleMgmt()" style="background:#1d3557;color:#a8c8ff;border:1px solid rgba(88,166,255,.3)">⚙️ 管理基金</button>
    <div id="syncStatus" class="loading"><span class="sync-dot"></span><span id="syncText">云端加载中…</span></div>
    <span class="btn-hint" id="countdown">每5分钟自动刷新</span>
  </div>
</div>

<!-- 基金管理面板 -->
<div id="mgmtPanel">
  <div class="mgmt-row">
    <span class="mgmt-label">基金编码</span>
    <input class="mgmt-input" id="addCode" type="text" maxlength="6" placeholder="6位编码，如 110022"
           oninput="this.value=this.value.replace(/\D/g,'').slice(0,6)">
    <input class="mgmt-input" id="addCost" type="number" min="0" step="0.01" placeholder="持仓成本（元）">
    <button class="btn btn-add" id="addBtn" onclick="addFund()">＋ 添加基金</button>
  </div>
  <div class="mgmt-hint" id="addHint">输入6位基金编码和持仓成本，自动拉取基金信息后添加到列表</div>
  <hr class="mgmt-divider">
  <div style="font-size:.75rem;color:#8b949e;margin-bottom:8px">当前持仓基金（点 × 删除）：</div>
  <div id="fundTagList"><!-- JS填充 --></div>
  <hr class="mgmt-divider">
  <!-- 云同步 Token 配置 -->
  <div style="font-size:.75rem;color:#8b949e;margin-bottom:8px">☁️ 云同步配置（跨设备数据同步）：</div>
  <div class="mgmt-row">
    <span class="mgmt-label">GitHub Token</span>
    <input class="mgmt-input" id="tokenInput" type="password"
           style="max-width:280px;font-family:monospace"
           placeholder="ghp_xxxxxxxxxx（留空则禁用云同步写入）">
    <button class="btn btn-save" onclick="saveToken()">保存Token</button>
    <button class="btn btn-danger" onclick="clearToken()" style="font-size:.75rem;padding:5px 10px">清除</button>
  </div>
  <div class="mgmt-hint" id="tokenHint">Token 仅存本地浏览器，不上传到 GitHub。用于保存成本到云端，所有设备刷新后同步</div>
</div>

<!-- 汇总 -->
<div class="card">
  <div class="card-title">▸ 总览</div>
  <div class="sum-grid">
    <div class="sum-item">
      <div class="sv" style="color:#58a6ff" id="totalCost">—</div>
      <div class="sl">总持仓成本</div>
    </div>
    <div class="sum-item">
      <div class="sv" style="color:#58a6ff" id="totalValue">—</div>
      <div class="sl">今日估算市值</div>
    </div>
    <div class="sum-item">
      <div class="sv" id="totalProfit">—</div>
      <div class="sl">今日浮动收益</div>
    </div>
    <div class="sum-item">
      <div class="sv" id="totalPct">—</div>
      <div class="sl">今日综合涨跌幅</div>
    </div>
  </div>
</div>

<!-- 涨跌幅条形图 -->
<div class="card">
  <div class="card-title">▸ 今日涨跌幅对比</div>
  <div id="barChart"><!-- JS 填充 --></div>
</div>

<!-- 明细表 -->
<div class="card">
  <div class="card-title">▸ 基金明细</div>
  <table>
    <thead>
      <tr>
        <th>基金</th><th>持仓成本</th><th>估算份额</th>
        <th>昨日净值</th><th>实时估值</th>
        <th>涨跌幅</th><th>今日浮盈</th><th>今日市值</th>
      </tr>
    </thead>
    <tbody id="fundTable"><!-- JS 填充 --></tbody>
  </table>
</div>

<!-- 资产分布 -->
<div class="card">
  <div class="card-title">▸ 持仓资产分布</div>
  <div class="pie-wrap">
    <svg width="220" height="220" viewBox="0 0 220 220" id="pieChart">
      <circle cx="110" cy="110" r="90" fill="rgba(255,255,255,.05)"/>
    </svg>
    <div style="flex:1;min-width:160px" id="pieLegend"><!-- JS 填充 --></div>
  </div>
</div>

<div class="footer">盘中估值仅供参考，以基金公司公布的实际净值为准</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════════
//  GitHub 云同步配置
// ══════════════════════════════════════════
const GH_OWNER  = 'xlbl0301';
const GH_REPO   = 'fund-monitor';
const GH_FILE   = 'user_data.json';
const LS_TOKEN_KEY = 'gh_sync_token';
function getToken() { return localStorage.getItem(LS_TOKEN_KEY) || ''; }
// GitHub Raw 读取（无鉴权，CDN 有 ~30s 缓存，加 ?t= 绕过）
const GH_RAW    = 'https://raw.githubusercontent.com/' + GH_OWNER + '/' + GH_REPO + '/main/' + GH_FILE;
// GitHub API 写入
const GH_API    = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + GH_FILE;

// ══════════════════════════════════════════
//  localStorage keys（仅作本地 fallback）
// ══════════════════════════════════════════
const LS_KEY        = 'fund_cost_overrides';
const LS_FUNDS_KEY  = 'fund_custom_list';

// 调色板（新增基金自动分配颜色）
const COLOR_POOL = [
  "#ff4d4f","#ff7a45","#ffc53d","#73d13d","#36cfc9",
  "#40a9ff","#9254de","#f759ab","#bfbfbf","#d4b106",
  "#ff85c2","#5cdbd3","#b37feb","#ffd666","#95de64",
  "#69b1ff","#ff9c6e","#ff7875","#a0d911","#36cfc9",
];

// 默认持仓配置（Actions 预填了 gsz/dwjz；云端加载成功后会被覆盖）
const DEFAULT_FUNDS = [
  {code:"008702",name:"华夏黄金ETF联接C",           cost:44076.21,gsz:"2.2469",dwjz:"2.2915",group:"黄金 & 贵金属",color:"#ff4d4f"},
  {code:"011036",name:"嘉实中证稀土产业ETF联接C",    cost:37545.90,gsz:"1.3286",dwjz:"1.3227",group:"稀土",         color:"#ff7a45"},
  {code:"014978",name:"华安纳斯达克100ETF联接(QDII)C",cost:11705.59,gsz:"6.9262",dwjz:"6.7408",group:"纳斯达克100",  color:"#ffc53d"},
  {code:"018044",name:"天弘纳斯达克100指数发起(QDII)C",cost:21196.47,gsz:"1.7457",dwjz:"1.6990",group:"纳斯达克100",color:"#73d13d"},
  {code:"008971",name:"大成纳斯达克100ETF联接(QDII)C", cost:1633.21,gsz:"5.4292",dwjz:"5.2839",group:"纳斯达克100", color:"#36cfc9"},
  {code:"019525",name:"华泰柏瑞纳斯达克100ETF发起式联接C",cost:3556.16,gsz:"1.4143",dwjz:"1.3764",group:"纳斯达克100",color:"#40a9ff"},
  {code:"004433",name:"南方有色金属ETF联接C",         cost:50817.85,gsz:"1.9952",dwjz:"2.0066",group:"黄金 & 贵金属",color:"#9254de"},
  {code:"016453",name:"南方纳斯达克100指数发起(QDII)C",cost:1970.26, gsz:"1.9726",dwjz:"1.9198",group:"纳斯达克100", color:"#f759ab"},
  {code:"025857",name:"华夏中证电网设备主题ETF发起式联接C",cost:3504.28,gsz:"1.2996",dwjz:"1.3092",group:"电网设备",color:"#bfbfbf"},
  {code:"016533",name:"嘉实纳斯达克100ETF发起联接(QDII)C",cost:282.39,gsz:"1.8465",dwjz:"1.7971",group:"纳斯达克100",color:"#d4b106"},
];

// ══════════════════════════════════════════
//  云同步状态 UI
// ══════════════════════════════════════════
function setSyncStatus(state, text) {
  const el = document.getElementById('syncStatus');
  const tx = document.getElementById('syncText');
  if (!el || !tx) return;
  el.className = state;  // loading | syncing | ok | error
  tx.textContent = text;
}

// ══════════════════════════════════════════
//  GitHub 读取 user_data.json（Raw CDN）
// ══════════════════════════════════════════
let _ghFileSha = '';  // 记录文件 SHA，写入时需要

async function loadCloudData() {
  setSyncStatus('loading', '云端加载中…');
  try {
    // 加时间戳绕过 CDN 缓存
    const res = await fetch(GH_RAW + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!Array.isArray(data.funds) || data.funds.length === 0) throw new Error('empty');

    // 成功：用云端数据覆盖 FUNDS（保留 gsz/dwjz 来自 DEFAULT_FUNDS/Actions）
    FUNDS = data.funds.map(cf => {
      const df = DEFAULT_FUNDS.find(d => d.code === cf.code);
      return Object.assign({}, cf, {
        gsz:  df ? df.gsz  : (cf.gsz  || '0'),
        dwjz: df ? df.dwjz : (cf.dwjz || '0'),
      });
    });

    setSyncStatus('ok', '云端已同步 · ' + (data.updatedAt ? data.updatedAt.slice(5,16) : ''));

    // 同时获取文件 SHA（用于后续写入）
    fetchGhFileSha();
    return true;
  } catch(e) {
    setSyncStatus('error', '云端不可用，使用本地');
    // fallback：localStorage
    FUNDS = loadFundList_local();
    fetchGhFileSha();  // 仍尝试获取 SHA
    return false;
  }
}

// 获取文件 SHA（写入时需要）
async function fetchGhFileSha() {
  try {
    const res = await fetch(GH_API, {
      headers: { 'Authorization': 'token ' + getToken() }
    });
    if (!res.ok) return;
    const d = await res.json();
    _ghFileSha = d.sha || '';
  } catch(e) {}
}

// ══════════════════════════════════════════
//  GitHub 写入 user_data.json
// ══════════════════════════════════════════
async function saveCloudData(showMsg = true) {
  const token = getToken();
  if (!token) {
    // 无 Token：仅本地保存
    saveFundList_local();
    setSyncStatus('error', '未配置Token，仅本地');
    if (showMsg) showToast('⚠️ 未配置 GitHub Token，修改仅存本地。\n请在「⚙️ 管理基金」中配置 Token 以启用云同步', true);
    return;
  }

  setSyncStatus('syncing', '同步中…');

  // 构造要保存的数据（去掉实时 gsz/dwjz）
  const now = new Date();
  const ts  = now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0') + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0');

  const payload = {
    version: 1,
    updatedAt: ts,
    funds: FUNDS.map(f => ({
      code:  f.code,
      name:  f.name,
      cost:  f.cost,
      group: f.group,
      color: f.color,
    }))
  };

  const jsonStr = JSON.stringify(payload, null, 2);
  const b64 = btoa(unescape(encodeURIComponent(jsonStr)));

  const body = {
    message: 'update user_data.json ' + ts,
    content: b64,
  };
  if (_ghFileSha) body.sha = _ghFileSha;

  try {
    const res = await fetch(GH_API, {
      method:  'PUT',
      headers: {
        'Authorization': 'token ' + getToken(),
        'Content-Type':  'application/json',
      },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      // SHA 冲突：重新获取 SHA 后重试一次
      if (res.status === 409 || (errData.message && errData.message.includes('sha'))) {
        await fetchGhFileSha();
        if (_ghFileSha) {
          body.sha = _ghFileSha;
          const res2 = await fetch(GH_API, {
            method: 'PUT',
            headers: { 'Authorization': 'token ' + getToken(), 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!res2.ok) throw new Error('retry failed ' + res2.status);
          const d2 = await res2.json();
          _ghFileSha = d2.content && d2.content.sha ? d2.content.sha : _ghFileSha;
        }
      } else {
        throw new Error('HTTP ' + res.status);
      }
    } else {
      const d = await res.json();
      _ghFileSha = d.content && d.content.sha ? d.content.sha : _ghFileSha;
    }

    // 同时存本地 fallback
    saveFundList_local();

    setSyncStatus('ok', '已同步到云端 · ' + ts.slice(5));
    if (showMsg) showToast('✅ 已同步到云端，所有设备即时生效');
  } catch(e) {
    setSyncStatus('error', '云端写入失败，已存本地');
    saveFundList_local();
    if (showMsg) showToast('⚠️ 云端写入失败，修改已存本地', true);
  }
}

function loadFundList_local() {
  try {
    const raw = localStorage.getItem(LS_FUNDS_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (Array.isArray(saved) && saved.length > 0) {
        return saved.map(sf => {
          const df = DEFAULT_FUNDS.find(d => d.code === sf.code);
          return df ? Object.assign({}, sf, {gsz: df.gsz, dwjz: df.dwjz}) : sf;
        });
      }
    }
  } catch(e) {}
  return DEFAULT_FUNDS.map(f => Object.assign({}, f));
}

  try {

      code: f.code, name: f.name, cost: f.cost,
      group: f.group, color: f.color
    }));
    localStorage.setItem(LS_FUNDS_KEY, JSON.stringify(toSave));
  } catch(e) {}
}

// 添加基金
async function addFund() {
  const codeInput = document.getElementById('addCode');
  const costInput = document.getElementById('addCost');
  const hintEl    = document.getElementById('addHint');
  const addBtn    = document.getElementById('addBtn');

  const code = codeInput.value.trim();
  const cost = parseFloat(costInput.value);

  // 校验
  if (!/^\d{6}$/.test(code)) {
    codeInput.classList.add('invalid');
    hintEl.innerHTML = '<em>⚠️ 请输入正确的6位基金编码</em>';
    return;
  }
  codeInput.classList.remove('invalid');

  if (isNaN(cost) || cost < 0) {
    costInput.classList.add('invalid');
    hintEl.innerHTML = '<em>⚠️ 请输入正确的持仓成本（元）</em>';
    return;
  }
  costInput.classList.remove('invalid');

  if (FUNDS.find(f => f.code === code)) {
    hintEl.innerHTML = '<em>⚠️ 基金 ' + code + ' 已在列表中</em>';
    return;
  }

  // 拉取基金信息
  addBtn.disabled = true;
  addBtn.textContent = '⏳ 查询中…';
  hintEl.innerHTML = '正在拉取基金 ' + code + ' 的信息…';

  try {
    const data = await fetchOneJSONP(code);
    if (!data || !data.name) {
      hintEl.innerHTML = '<em>⚠️ 未找到基金 ' + code + '，请核对编码</em>';
      addBtn.disabled = false; addBtn.textContent = '＋ 添加基金';
      return;
    }

    // 分配颜色
    const usedColors = new Set(FUNDS.map(f => f.color));
    const color = COLOR_POOL.find(c => !usedColors.has(c)) || COLOR_POOL[FUNDS.length % COLOR_POOL.length];

    const newFund = {
      code:  data.fundcode || code,
      name:  data.name,
      cost:  cost,
      gsz:   data.gsz  || data.dwjz || '0',
      dwjz:  data.dwjz || data.gsz  || '0',
      group: '自选基金',
      color: color,
    };

    FUNDS.push(newFund);
    fetched[newFund.code] = { gsz: newFund.gsz, dwjz: newFund.dwjz };

    hintEl.innerHTML = '<em>✅ 已添加：' + newFund.name + ' · 同步中…</em>';
    codeInput.value = '';
    costInput.value = '';
    renderFundTags();
    render();

    // 云端同步
    await saveCloudData(false);
    hintEl.innerHTML = '<em>✅ 已添加并同步：' + newFund.name + '</em>';
    showToast('✅ 已添加 ' + newFund.name + '，云端同步完成');
  } catch(e) {
    hintEl.innerHTML = '<em>⚠️ 拉取失败，请检查网络后重试</em>';
  }

  addBtn.disabled = false;
  addBtn.textContent = '＋ 添加基金';
}

// 删除基金
async function deleteFund(code) {
  const f = FUNDS.find(f => f.code === code);
  if (!f) return;
  if (!confirm('确认删除基金 ' + code + '（' + f.name + '）？\n此操作不影响持仓成本记录，可重新添加。')) return;

  FUNDS = FUNDS.filter(f => f.code !== code);
  delete fetched[code];

  renderFundTags();
  render();

  // 云端同步
  await saveCloudData(false);
  showToast('🗑️ 已删除 ' + f.name + '，云端同步完成');
}

function fmtY(v) { return '¥' + Number(v).toLocaleString('zh-CN',{minimumFractionDigits:2,maxFractionDigits:2}); }

const GROUP_LABELS = {
  "黄金 & 贵金属": "黄金 & 贵金属",
  "稀土": "稀土产业",

// ══════════════════════════════════════════
//  JSONP 拉取
// ══════════════════════════════════════════
window._jsonpCallbacks = {};
window._jsonpTimers    = {};
window.jsonpgz = function(data) {
  if (!data || !data.fundcode) return;
  const code = data.fundcode;
  if (window._jsonpCallbacks[code]) {
    clearTimeout(window._jsonpTimers[code]);
    window._jsonpCallbacks[code](data);
    delete window._jsonpCallbacks[code];
    delete window._jsonpTimers[code];
    const el = document.getElementById('jsonp_script_' + code);
    if (el) el.remove();
  }
};

function fetchOneJSONP(code) {
  return new Promise((resolve) => {
    window._jsonpCallbacks[code] = resolve;
    window._jsonpTimers[code] = setTimeout(() => {
      delete window._jsonpCallbacks[code];
      delete window._jsonpTimers[code];
      const el = document.getElementById('jsonp_script_' + code);
      if (el) el.remove();
      resolve(null);
    }, 10000);

    const script = document.createElement('script');
    script.id  = 'jsonp_script_' + code;
    script.src = 'https://fundgz.1234567.com.cn/js/' + code + '.js?rt=' + Date.now();
    script.onerror = function() {
      clearTimeout(window._jsonpTimers[code]);
      delete window._jsonpCallbacks[code];
      delete window._jsonpTimers[code];
      const el = document.getElementById('jsonp_script_' + code);
      if (el) el.remove();
      resolve(null);
    };
    document.head.appendChild(script);
  });
}

function unlockUI() {
  const btn = document.getElementById('refreshBtn');
  if (btn) { btn.disabled = false; btn.textContent = '🔄 刷新数据'; }
  const loading = document.getElementById('loading');

function fetchAllFunds() {
  return Promise.allSettled(FUNDS.map(f => fetchOneJSONP(f.code)));

// ══════════════════════════════════════════
//  指数行情（上证/深证/创业板/纳斯达克）
// ══════════════════════════════════════════
const IDX_CODES = [
  { code: 'sh000001', name: '上证指数' },
  { code: 'sz399001', name: '深证成指' },
  { code: 'sz399006', name: '创业板指' },
  { code: 'usr_ixic', name: '纳斯达克' },
];

// 腾讯 qt.gtimg.cn 允许跨域 fetch，直接解析
async function fetchIndexJSONP() {
  const codes = IDX_CODES.map(i => i.code).join(',');
  const url   = 'https://qt.gtimg.cn/q=' + codes + '&r=' + Date.now();
  try {
    const res  = await fetch(url);
    const text = await res.text();
    const chips = [];
    IDX_CODES.forEach(idx => {
      const re  = new RegExp('v_' + idx.code + '="([^"]+)"');
      const m   = text.match(re);
      if (!m) return;
      const parts = m[1].split('~');
      const price  = parseFloat(parts[3]);
      const close  = parseFloat(parts[4]);
      const chgPct = parseFloat(parts[32]);
      const chgAmt = parseFloat(parts[31]);
      if (isNaN(price)) return;
      chips.push({ name: idx.name, price, chgPct, chgAmt });
    });
    renderIndexBar(chips);
  } catch(e) {
    const el = document.getElementById('indexBar');
    if (el) el.innerHTML = '<span class="idx-loading">指数数据暂不可用</span>';
  }
}

function renderIndexBar(chips) {
  const el = document.getElementById('indexBar');
  if (!el) return;
  if (!chips || chips.length === 0) {
    el.innerHTML = '<span class="idx-loading">指数数据暂不可用</span>';
    return;
  }
  el.innerHTML = chips.map(c => {
    const up    = c.chgPct >= 0;
    const cls   = up ? 'up' : 'down';
    const sign  = up ? '+' : '';
    const arrow = up ? '▲' : '▼';
    return '<span class="index-chip ' + cls + '">' +
      '<span class="idx-name">' + c.name + '</span>' +
      '<span class="idx-val">' + c.price.toFixed(2) + '</span>' +
      '<span class="idx-pct ' + cls + '">' + arrow + ' ' + sign + c.chgPct.toFixed(2) + '%</span>' +
    '</span>';
  }).join('');
}

async function fetchAll() {
  const btn = document.getElementById('refreshBtn');
  if (btn && btn.disabled) return;
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 刷新中…'; }
  const loading = document.getElementById('loading');
  if (loading) loading.classList.remove('hidden');
  const errEl = document.getElementById('errorMsg');
  if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }

  let settled;
  try {
    [settled] = await Promise.all([
      Promise.race([
        fetchAllFunds(),
        new Promise((_, reject) => setTimeout(() => reject(new Error('TIMEOUT')), 8000))
      ]),
      fetchIndexJSONP(),
    ]);
  } catch(e) {
    settled = FUNDS.map(() => ({ status: 'rejected', reason: e }));
    fetchIndexJSONP();
  }

  const newFetched = Object.assign({}, fetched);
  const failed = [];
  for (let i = 0; i < FUNDS.length; i++) {
    const r = settled[i];
    if (r && r.status === 'fulfilled' && r.value) {
      newFetched[FUNDS[i].code] = r.value;
    } else if (!fetched[FUNDS[i].code]) {
      failed.push(FUNDS[i].code);
    }
  }
  fetched = newFetched;

  if (errEl) {
    errEl.style.display = failed.length > 0 ? 'block' : 'none';
    if (failed.length > 0) errEl.textContent = '以下基金暂无数据（保留上次估值）：' + failed.join(', ');
  }

  render();
  resetCountdown();
  unlockUI();
}

// ══════════════════════════════════════════
//  渲染函数
// ══════════════════════════════════════════
function render() {
  const now = new Date();
  document.getElementById('updateTime').textContent =
    '更新时间：' + now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0') + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0') + ':' +
    String(now.getSeconds()).padStart(2,'0') + ' · 数据来源：天天基金';

  let totalCost = 0, totalValue = 0, totalProfit = 0;
  let rows = [], maxPct = 0;

  FUNDS.forEach(f => {
    const d = fetched[f.code];
    if (!d) return;
    const gsz  = parseFloat(d.gsz);
    const dwjz = parseFloat(d.dwjz);
    if (isNaN(gsz) || isNaN(dwjz) || dwjz === 0) return;
    const shares   = f.cost / dwjz;
    const curValue = shares * gsz;
    const profit   = curValue - f.cost;
    const pct      = (gsz - dwjz) / dwjz * 100;
    if (Math.abs(pct) > maxPct) maxPct = Math.abs(pct);
    totalCost   += f.cost;
    totalValue  += curValue;
    totalProfit += profit;
    rows.push({...f, gsz, dwjz, shares, curValue, profit, pct});
  });

  // ── 总览 ──
  const totalPct = totalCost > 0 ? (totalValue - totalCost) / totalCost * 100 : 0;
  const isUp  = totalProfit >= 0;
  const color = isUp ? '#ff4d4f' : '#3fb950';
  const setEl = (id, val, clr) => {
    const el = document.getElementById(id);
    if (el) { el.textContent = val; if (clr) el.style.color = clr; }
  };
  setEl('totalCost',   totalCost > 0 ? fmtY(totalCost)   : '—');
  setEl('totalValue',  totalCost > 0 ? fmtY(totalValue)  : '—');
  setEl('totalProfit', totalCost > 0 ? (isUp?'+':'') + fmtY(totalProfit) : '—', color);
  setEl('totalPct',    totalCost > 0 ? (isUp?'+':'') + fmt(totalPct,2) + '%' : '—', color);

  // ── 条形图 ──
  const barEl = document.getElementById('barChart');
  if (rows.length === 0) {
    barEl.innerHTML = '<div style="text-align:center;color:#484f58;font-size:.8rem;padding:12px">暂无数据</div>';
  } else {
    barEl.innerHTML = rows.map(r => {
      const w = maxPct > 0 ? Math.round(Math.abs(r.pct) / maxPct * 100) : 0;
      const c = r.pct >= 0 ? '#ff4d4f' : '#3fb950';
      return '<div class="bar-row">' +
        '<span class="bl">' + r.code + '</span>' +
        '<div class="bt"><div class="bf" style="width:' + w + '%;background:' + c + '"></div></div>' +
        '<span class="bv" style="color:' + c + '">' + (r.pct>=0?'+':'') + fmt(r.pct,2) + '%</span>' +
      '</div>';
    }).join('');
  }

  // ── 分组表格 ──
  const groups = {};
  rows.forEach(r => {
    const g = GROUP_LABELS[r.group] || r.group;
    if (!groups[g]) groups[g] = [];
    groups[g].push(r);
  });

  const tableEl = document.getElementById('fundTable');
  if (rows.length === 0) {
    tableEl.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#484f58;padding:24px">暂无数据，请点击「刷新数据」</td></tr>';
    return;
  }

  function buildCostCell(f) {
    if (editMode) {
      return '<td class="r edit-mode">' +
        '<span class="cost-static">' + fmtY(f.cost) + '</span>' +
        '<input class="cost-input" type="number" min="0" step="0.01" ' +
               'data-code="' + f.code + '" value="' + f.cost.toFixed(2) + '" ' +
               'onblur="validateInput(this)">' +
        '</td>';
    }
    return '<td class="r"><span class="cost-static">' + fmtY(f.cost) + '</span></td>';
  }

  tableEl.innerHTML = Object.entries(groups).map(([gName, items]) => {
    const rows2 = items.map(r => {
      const pc = r.pct >= 0 ? '#ff4d4f' : '#3fb950';
      const sc = r.profit >= 0 ? '#ff4d4f' : '#3fb950';
      return '<tr>' +
        '<td><span class="fc">' + r.code + '</span><br><small class="fname">' + r.name + '</small></td>' +
        buildCostCell(r) +
        '<td class="r num">' + fmt(r.shares,2) + '</td>' +
        '<td class="r num">' + r.dwjz + '</td>' +
        '<td class="r num bold" style="color:' + pc + '">' + r.gsz + '</td>' +
        '<td class="r bold" style="color:' + pc + '">' + (r.pct>=0?'+':'') + fmt(r.pct,2) + '%</td>' +
        '<td class="r bold" style="color:' + sc + '">' + (r.profit>=0?'+':'') + fmtY(r.profit) + '</td>' +
        '<td class="r bold" style="color:' + pc + '">' + fmtY(r.curValue) + '</td>' +
      '</tr>';
    }).join('');
    return '<tr class="group-header"><td colspan="8">' + gName + '</td></tr>' + rows2;
  }).join('');

  // ── 饼图 ──
  const pieEl = document.getElementById('pieChart');
  const legEl = document.getElementById('pieLegend');
  const cx = 110, cy = 110, radius = 90;
  let startAngle = -90;
  let paths = [], legends = [];

  rows.forEach(row => {
    const angle = (row.cost / totalCost) * 360;
    const endA  = startAngle + angle;
    const x1 = (cx + radius * Math.cos(startAngle * Math.PI / 180)).toFixed(2);
    const y1 = (cy + radius * Math.sin(startAngle * Math.PI / 180)).toFixed(2);
    const x2 = (cx + radius * Math.cos(endA * Math.PI / 180)).toFixed(2);
    const y2 = (cy + radius * Math.sin(endA * Math.PI / 180)).toFixed(2);
    const largeArc = angle > 180 ? 1 : 0;
    const d = 'M' + cx + ',' + cy + ' L' + x1 + ',' + y1 + ' A' + radius + ',' + radius + ' 0 ' + largeArc + ',1 ' + x2 + ',' + y2 + ' Z';
    paths.push('<path d="' + d + '" fill="' + row.color + '" opacity="0.85"/>');
    const pct = (row.cost / totalCost * 100).toFixed(1);
    legends.push('<div class="leg-item"><span class="leg-dot" style="background:' + row.color + '"></span><span class="leg-lbl">' + row.code + '</span><span class="leg-pct">' + pct + '%</span></div>');
    startAngle = endA;
  });

  const costWan = (totalCost / 10000).toFixed(1);
  pieEl.innerHTML = paths.join('') +
    '<circle cx="' + cx + '" cy="' + cy + '" r="42" fill="#161b22"/>' +
    '<text x="' + cx + '" y="106" text-anchor="middle" fill="#c9d1d9" font-size="11">总成本</text>' +
    '<text x="' + cx + '" y="122" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">¥' + costWan + '万</text>';
  legEl.innerHTML = legends.join('');
}

function validateInput(input) {
  const v = parseFloat(input.value);
  input.classList.toggle('invalid', isNaN(v) || v < 0);
}

function resetCountdown() {
  cd = 300;
  if (refreshTimer) clearInterval(refreshTimer);
  if (countdownTimer) clearInterval(countdownTimer);
  refreshTimer = setInterval(fetchAll, 5 * 60 * 1000);
  countdownTimer = setInterval(() => {
    cd--;
    if (!editMode) {
      const m = String(Math.floor(cd / 60)).padStart(2, '0');
      const s = String(cd % 60).padStart(2, '0');
      document.getElementById('countdown').textContent = m + ':' + s + ' 后自动刷新';
    }
    if (cd <= 0) resetCountdown();
  }, 1000);
}

// ── 初始化：先加载云端数据，再决定是否用预填值 ──
async function init() {
  // 1. 加载云端数据（覆盖 FUNDS 的 cost 字段）
  await loadCloudData();

  // 2. 检查是否有 Actions 预填的实时净值
  function checkInitData() {
    const f = FUNDS[0];
    return f && f.gsz && f.gsz !== '{{' && f.dwjz && f.dwjz !== '{{';
  }

  if (checkInitData()) {
    hasInitData = true;
    FUNDS.forEach(f => { fetched[f.code] = { gsz: f.gsz, dwjz: f.dwjz }; });
    render();
    fetchIndexJSONP();
    resetCountdown();
  } else {
    const cdEl = document.getElementById('countdown');
    if (cdEl) cdEl.textContent = '05:00 后自动刷新';
    fetchAll();
    resetCountdown();
  }
}

init();
</script>
</body>
</html>
